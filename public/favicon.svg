<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 40 40" fill="none">
  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="#4A7C2F"/>
  <!-- Wheat stalk -->
  <line x1="9" y1="32" x2="9" y2="18" stroke="#F5A623" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <ellipse cx="9" cy="17" rx="2.2" ry="1.3" fill="#F5A623" opacity="0.7" transform="rotate(-15 9 17)"/>
  <ellipse cx="7.5" cy="20" rx="1.8" ry="1.1" fill="#F5A623" opacity="0.55" transform="rotate(20 7.5 20)"/>
  <ellipse cx="10.5" cy="20" rx="1.8" ry="1.1" fill="#F5A623" opacity="0.55" transform="rotate(-20 10.5 20)"/>
  <!-- Bar chart -->
  <rect x="17" y="26" width="4" height="6" rx="1" fill="#A8D878" opacity="0.8"/>
  <rect x="22.5" y="22" width="4" height="10" rx="1" fill="#A8D878" opacity="0.9"/>
  <rect x="28" y="17" width="4" height="15" rx="1" fill="#fff"/>
  <!-- Hen head -->
  <circle cx="30.5" cy="15.5" r="3.8" fill="#fff"/>
  <!-- Comb -->
  <path d="M29 12.5 Q29.5 10.5 30.5 11.5 Q31 9.5 31.5 11.5 Q32 10 32.5 12" stroke="#F5A623" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Beak -->
  <path d="M33.8 15.8 L35.5 16.2 L33.6 17" fill="#F5A623"/>
  <!-- Wattle -->
  <ellipse cx="33.2" cy="17.2" rx="0.9" ry="1.2" fill="#F5A623" opacity="0.9"/>
  <!-- Eye -->
  <circle cx="31.2" cy="15" r="0.7" fill="#4A7C2F"/>
  <!-- Wing sweep -->
  <path d="M23 21 Q27 17.5 32 18.5" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85"/>
  <!-- Tail feathers -->
  <path d="M16 22 Q13 18 14.5 15" stroke="#fff" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M16.5 23 Q12.5 20 13.5 17" stroke="#fff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Feet -->
  <path d="M22 32 L21 35 M22 32 L23 35 M22 32 L20.5 35" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
  <path d="M27 32 L26 35 M27 32 L28 35 M27 32 L25.5 35" stroke="#F5A623" stroke-width="1" stroke-linecap="round"/>
  <!-- Trend line -->
  <polyline points="17,29 19,26 22,24 26,21 30,18" stroke="#F5A623" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
</svg>
